<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>毛雨杭 · 作品集</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --border: #232328;
    --text: #e8e8ec;
    --text-dim: #888892;
    --accent: #c8a46e;
    --accent-dim: rgba(200, 164, 110, 0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Loading Screen ── */
  #loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #loading-screen .loader {
    width: 48px; height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading-screen .title-text {
    margin-top: 24px;
    font-family: 'Noto Serif SC', serif;
    font-size: 18px; font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
  }
  #loading-screen .progress-text {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Top Bar ── */
  #topbar {
    height: 48px; flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px;
    z-index: 100;
  }
  #topbar .left { display: flex; align-items: center; gap: 10px; }
  #topbar .brand {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px; font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    user-select: none;
  }
  #topbar .controls {
    display: flex; align-items: center; gap: 8px;
  }
  #topbar .page-info {
    font-size: 12px; color: var(--text-dim);
    min-width: 60px; text-align: center;
    font-variant-numeric: tabular-nums;
    user-select: none;
  }
  #topbar button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 14px;
  }
  #topbar button:hover, #topbar button:active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  #topbar button:disabled {
    opacity: 0.3; cursor: default;
    border-color: var(--border); color: var(--text-dim);
    background: transparent;
  }
  #topbar button.active-btn {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .zoom-group {
    display: flex; align-items: center; gap: 2px;
    background: var(--bg); border-radius: 6px; padding: 2px;
  }
  .zoom-group button { border: none; border-radius: 4px; width: 28px; height: 28px; }
  #zoom-level {
    font-size: 11px; color: var(--text-dim);
    min-width: 38px; text-align: center;
    user-select: none;
  }
  .divider {
    width: 1px; height: 18px;
    background: var(--border);
    margin: 0 2px;
  }

  /* ── Main Content ── */
  #main {
    flex: 1; overflow: hidden; position: relative;
    display: flex;
  }

  /* ── Sidebar Thumbnails ── */
  #sidebar {
    width: 0; overflow: hidden;
    background: var(--surface);
    border-right: 1px solid var(--border);
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  #sidebar.open { width: 160px; }
  #sidebar-header {
    padding: 10px 12px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  #thumb-list {
    flex: 1; overflow-y: auto;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  #thumb-list::-webkit-scrollbar { width: 3px; }
  #thumb-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .thumb-item {
    cursor: pointer; border-radius: 4px;
    overflow: hidden; border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    flex-shrink: 0;
  }
  .thumb-item:hover { border-color: var(--accent); transform: scale(1.03); }
  .thumb-item.active { border-color: var(--accent); }
  .thumb-item canvas {
    width: 100%; display: block;
    border-radius: 2px;
  }
  .thumb-item .page-num {
    position: absolute; bottom: 3px; right: 5px;
    font-size: 9px; color: var(--text-dim);
    background: rgba(0,0,0,0.6);
    padding: 1px 4px; border-radius: 2px;
  }

  /* ── Viewer Area ── */
  #viewer-wrap {
    flex: 1; overflow: auto;
    display: flex; justify-content: flex-start;
    align-items: flex-start;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }
  #viewer-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
  #viewer-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #viewer-wrap::-webkit-scrollbar-corner { background: transparent; }

  #page-canvas {
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
    border-radius: 4px;
    display: block;
    margin: 0 auto;
  }

  /* ── Scroll Mode ── */
  #viewer-wrap.scroll-mode {
    flex-direction: column; align-items: center;
    justify-content: flex-start;
    padding: 16px 16px 80px;
    gap: 12px;
  }
  #viewer-wrap.scroll-mode #page-canvas { display: none; }
  .scroll-page-canvas {
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 1px var(--border);
    border-radius: 4px;
    max-width: 100%;
    display: block;
  }

  /* ── Progress Bar ── */
  #progress-bar {
    position: fixed; top: 48px; left: 0; height: 2px;
    background: var(--accent); z-index: 200;
    transition: width 0.3s;
  }

  /* ── Keyboard Hint (desktop only) ── */
  .hint {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 20px;
    font-size: 11px; color: var(--text-dim);
    opacity: 0; pointer-events: none;
    z-index: 50;
    transition: opacity 0.3s;
  }
  body:hover .hint { opacity: 0.5; }
  .hint:hover { opacity: 1 !important; pointer-events: auto; }
  .hint kbd {
    background: var(--bg); padding: 1px 5px;
    border-radius: 3px; font-size: 10px;
    border: 1px solid var(--border);
    margin: 0 2px;
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    #topbar { padding: 0 8px; height: 44px; }
    #topbar .brand { font-size: 12px; letter-spacing: 1px; }
    #topbar button { width: 30px; height: 30px; font-size: 13px; }
    .hint { display: none; }
    #sidebar.open { width: 120px; }
    #viewer-wrap { padding: 8px; }
    #viewer-wrap.scroll-mode { padding: 8px 8px 60px; gap: 8px; }
    .divider { display: none; }
    .zoom-group { display: none; }
    #btn-fit { display: none; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loader"></div>
  <div class="title-text">毛雨杭 · 作品集</div>
  <div class="progress-text" id="load-progress">准备加载...</div>
</div>

<!-- Progress -->
<div id="progress-bar" style="width:0%"></div>

<!-- Top Bar -->
<div id="topbar">
  <div class="left">
    <button id="btn-sidebar" title="缩略图 (T)">☰</button>
    <div class="brand">毛雨杭 · 作品集</div>
  </div>
  <div class="controls">
    <button id="btn-prev" title="上一页" disabled>‹</button>
    <div class="page-info"><span id="cur-page">1</span> / <span id="total-pages">—</span></div>
    <button id="btn-next" title="下一页">›</button>
    <div class="divider"></div>
    <div class="zoom-group">
      <button id="btn-zoom-out" title="缩小">−</button>
      <span id="zoom-level">100%</span>
      <button id="btn-zoom-in" title="放大">+</button>
    </div>
    <button id="btn-fit" title="适应窗口">⊡</button>
    <div class="divider"></div>
    <button id="btn-scroll-mode" title="滚动模式">⇣</button>
    <button id="btn-fullscreen" title="全屏">⛶</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">页面</div>
    <div id="thumb-list"></div>
  </div>
  <div id="viewer-wrap">
    <canvas id="page-canvas"></canvas>
  </div>
</div>

<div class="hint">
  <kbd>←</kbd><kbd>→</kbd> 翻页 · <kbd>滚轮</kbd> 翻页/滚动 · <kbd>Ctrl+滚轮</kbd> 缩放 · <kbd>F</kbd> 全屏 · <kbd>T</kbd> 缩略图
</div>

<script>
(function() {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  var MIN_SCALE = 0.3;
  var MAX_SCALE = 4.0;

  var pdfDoc = null;
  var currentPage = 1;
  var totalPages = 0;
  var currentScale = 1.0;
  var fitScale = 1.0;
  var isScrollMode = false;
  var rendering = false;

  var $ = function(id) { return document.getElementById(id); };
  var canvas = $('page-canvas');
  var ctx = canvas.getContext('2d');
  var viewerWrap = $('viewer-wrap');
  var thumbList = $('thumb-list');
  var loadingScreen = $('loading-screen');

  // ── Load PDF from URL (no base64!) ──
  function loadPDF() {
    $('load-progress').textContent = '加载文件...';

    var loadingTask = pdfjsLib.getDocument('portfolio.pdf');
    loadingTask.onProgress = function(p) {
      if (p.total > 0) {
        var pct = Math.round(p.loaded / p.total * 100);
        $('load-progress').textContent = '加载中 ' + pct + '%';
        $('progress-bar').style.width = pct + '%';
      }
    };

    loadingTask.promise.then(function(pdf) {
      pdfDoc = pdf;
      totalPages = pdf.numPages;
      $('total-pages').textContent = totalPages;
      $('progress-bar').style.width = '100%';
      setTimeout(function() { $('progress-bar').style.opacity = '0'; }, 500);

      return calcFitScale().then(function() {
        currentScale = fitScale;
        return renderPage(currentPage);
      });
    }).then(function() {
      loadingScreen.classList.add('hidden');
      generateThumbnails();
      // Default to scroll mode
      enterScrollMode();
    }).catch(function(e) {
      loadingScreen.querySelector('.title-text').textContent = '加载失败';
      loadingScreen.querySelector('.loader').style.display = 'none';
      $('load-progress').textContent = e.message;
      console.error(e);
    });
  }

  function calcFitScale() {
    return pdfDoc.getPage(1).then(function(page) {
      var vp = page.getViewport({ scale: 1.0 });
      var availW = viewerWrap.clientWidth - 32;
      var availH = viewerWrap.clientHeight - 32;
      fitScale = Math.min(availW / vp.width, availH / vp.height, 1.5);
    });
  }

  function renderPage(num, scale) {
    if (rendering) return Promise.resolve();
    rendering = true;
    scale = scale || currentScale;

    return pdfDoc.getPage(num).then(function(page) {
      var vp = page.getViewport({ scale: scale });
      var dpr = window.devicePixelRatio || 1;

      canvas.width = Math.floor(vp.width * dpr);
      canvas.height = Math.floor(vp.height * dpr);
      canvas.style.width = Math.floor(vp.width) + 'px';
      canvas.style.height = Math.floor(vp.height) + 'px';

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      return page.render({ canvasContext: ctx, viewport: vp }).promise;
    }).then(function() {
      $('cur-page').textContent = num;
      $('btn-prev').disabled = num <= 1;
      $('btn-next').disabled = num >= totalPages;
      $('zoom-level').textContent = Math.round(scale * 100) + '%';

      document.querySelectorAll('.thumb-item').forEach(function(t) { t.classList.remove('active'); });
      var activeThumb = document.querySelector('.thumb-item[data-page="' + num + '"]');
      if (activeThumb) {
        activeThumb.classList.add('active');
        activeThumb.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }

      rendering = false;
    });
  }

  // ── Thumbnails ──
  function generateThumbnails() {
    var i = 1;
    function nextThumb() {
      if (i > totalPages) return;
      pdfDoc.getPage(i).then(function(page) {
        var vp = page.getViewport({ scale: 0.25 });
        var thumbCanvas = document.createElement('canvas');
        thumbCanvas.width = vp.width;
        thumbCanvas.height = vp.height;
        var thumbCtx = thumbCanvas.getContext('2d');
        return page.render({ canvasContext: thumbCtx, viewport: vp }).promise.then(function() {
          var item = document.createElement('div');
          item.className = 'thumb-item' + (i === currentPage ? ' active' : '');
          item.dataset.page = i;
          var pageNum = document.createElement('span');
          pageNum.className = 'page-num';
          pageNum.textContent = i;
          item.appendChild(thumbCanvas);
          item.appendChild(pageNum);
          (function(pg) {
            item.addEventListener('click', function() { goToPage(pg); });
          })(i);
          thumbList.appendChild(item);
          i++;
          setTimeout(nextThumb, 10);
        });
      });
    }
    nextThumb();
  }

  // ── Scroll Mode ──
  function enterScrollMode() {
    isScrollMode = true;
    canvas.style.display = 'none';
    viewerWrap.classList.add('scroll-mode');
    viewerWrap.querySelectorAll('.scroll-page-canvas').forEach(function(c) { c.remove(); });
    $('btn-scroll-mode').classList.add('active-btn');

    var i = 1;
    function renderNext() {
      if (i > totalPages) return;
      pdfDoc.getPage(i).then(function(page) {
        var vp = page.getViewport({ scale: fitScale });
        var dpr = window.devicePixelRatio || 1;
        var pageCanvas = document.createElement('canvas');
        pageCanvas.className = 'scroll-page-canvas';
        pageCanvas.width = Math.floor(vp.width * dpr);
        pageCanvas.height = Math.floor(vp.height * dpr);
        pageCanvas.style.width = Math.floor(vp.width) + 'px';
        pageCanvas.style.height = Math.floor(vp.height) + 'px';
        pageCanvas.dataset.page = i;
        var pageCtx = pageCanvas.getContext('2d');
        pageCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return page.render({ canvasContext: pageCtx, viewport: vp }).promise.then(function() {
          viewerWrap.appendChild(pageCanvas);
          i++;
          setTimeout(renderNext, 5);
        });
      });
    }
    renderNext();
  }

  function exitScrollMode() {
    isScrollMode = false;
    canvas.style.display = '';
    viewerWrap.classList.remove('scroll-mode');
    viewerWrap.querySelectorAll('.scroll-page-canvas').forEach(function(c) { c.remove(); });
    $('btn-scroll-mode').classList.remove('active-btn');
    renderPage(currentPage);
  }

  // ── Navigation ──
  function goToPage(num) {
    if (num < 1 || num > totalPages) return;
    if (isScrollMode) {
      var target = viewerWrap.querySelector('.scroll-page-canvas[data-page="' + num + '"]');
      if (target) target.scrollIntoView({ behavior: 'smooth' });
      currentPage = num;
      $('cur-page').textContent = num;
      $('btn-prev').disabled = num <= 1;
      $('btn-next').disabled = num >= totalPages;
    } else {
      currentPage = num;
      renderPage(currentPage);
    }
  }

  function prevPage() { goToPage(currentPage - 1); }
  function nextPage() { goToPage(currentPage + 1); }

  function zoomIn() {
    currentScale = Math.min(currentScale * 1.2, MAX_SCALE);
    if (isScrollMode) exitScrollMode();
    renderPage(currentPage, currentScale);
  }
  function zoomOut() {
    currentScale = Math.max(currentScale / 1.2, MIN_SCALE);
    if (isScrollMode) exitScrollMode();
    renderPage(currentPage, currentScale);
  }
  function fitPage() {
    calcFitScale().then(function() {
      currentScale = fitScale;
      if (isScrollMode) exitScrollMode();
      renderPage(currentPage);
    });
  }

  // ── Events ──
  $('btn-prev').addEventListener('click', prevPage);
  $('btn-next').addEventListener('click', nextPage);
  $('btn-zoom-in').addEventListener('click', zoomIn);
  $('btn-zoom-out').addEventListener('click', zoomOut);
  $('btn-fit').addEventListener('click', fitPage);
  $('btn-fullscreen').addEventListener('click', function() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });
  $('btn-sidebar').addEventListener('click', function() {
    $('sidebar').classList.toggle('open');
  });
  $('btn-scroll-mode').addEventListener('click', function() {
    if (isScrollMode) exitScrollMode();
    else enterScrollMode();
  });

  // Mouse wheel
  var wheelDebounce = false;
  viewerWrap.addEventListener('wheel', function(e) {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      if (e.deltaY < 0) zoomIn();
      else zoomOut();
      return;
    }
    if (!isScrollMode) {
      e.preventDefault();
      if (wheelDebounce) return;
      wheelDebounce = true;
      if (e.deltaY > 0) nextPage();
      else if (e.deltaY < 0) prevPage();
      setTimeout(function() { wheelDebounce = false; }, 200);
    }
  }, { passive: false });

  // ── Touch swipe support ──
  var touchStartX = 0;
  var touchStartY = 0;
  var touchStartTime = 0;

  viewerWrap.addEventListener('touchstart', function(e) {
    if (isScrollMode) return; // let native scroll work in scroll mode
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });

  viewerWrap.addEventListener('touchend', function(e) {
    if (isScrollMode) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    var dt = Date.now() - touchStartTime;

    // Swipe detection: horizontal > vertical, fast enough
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5 && dt < 500) {
      if (dx < 0) nextPage();
      else prevPage();
    }
  }, { passive: true });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    switch(e.key) {
      case 'ArrowLeft': prevPage(); break;
      case 'ArrowRight': nextPage(); break;
      case '+': case '=': zoomIn(); break;
      case '-': zoomOut(); break;
      case 'f': case 'F':
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
        break;
      case 't': case 'T': $('sidebar').classList.toggle('open'); break;
      case 's': case 'S':
        if (isScrollMode) exitScrollMode();
        else enterScrollMode();
        break;
      case 'Home': goToPage(1); break;
      case 'End': goToPage(totalPages); break;
    }
  });

  // Resize
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      calcFitScale().then(function() {
        if (isScrollMode) {
          exitScrollMode();
          enterScrollMode();
        }
      });
    }, 200);
  });

  // Scroll mode page tracking
  viewerWrap.addEventListener('scroll', function() {
    if (!isScrollMode) return;
    var canvases = viewerWrap.querySelectorAll('.scroll-page-canvas');
    var mid = viewerWrap.scrollTop + viewerWrap.clientHeight / 2;
    for (var j = 0; j < canvases.length; j++) {
      var c = canvases[j];
      var top = c.offsetTop;
      var bottom = top + c.offsetHeight;
      if (mid >= top && mid <= bottom) {
        currentPage = parseInt(c.dataset.page);
        $('cur-page').textContent = currentPage;
        $('btn-prev').disabled = currentPage <= 1;
        $('btn-next').disabled = currentPage >= totalPages;
        document.querySelectorAll('.thumb-item').forEach(function(t) { t.classList.remove('active'); });
        var activeThumb = document.querySelector('.thumb-item[data-page="' + currentPage + '"]');
        if (activeThumb) activeThumb.classList.add('active');
        break;
      }
    }
  });

  // Start
  loadPDF();
})();
</script>
</body>
</html>
