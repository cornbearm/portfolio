<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品集目录 · Mao Yuhang Portfolio</title>
<meta name="description" content="毛雨杭 Mao Yuhang - 视觉设计 · IP衍生品 · AIGC创作。作品集展示品牌设计、衍生品设计、AIGC内容创作、游戏与插画等领域创意作品。">
<meta name="keywords" content="毛雨杭, Mao Yuhang, 视觉设计, 品牌设计, IP衍生品, AIGC, 作品集, Portfolio, Designer">
<meta property="og:title" content="毛雨杭 Mao Yuhang · Portfolio">
<meta property="og:description" content="视觉设计 · IP衍生品 · AIGC创作">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--c-bg:#fff;--c-text:#1a1a1a;--c-sub:#6e6e6e;--c-light:#999;--c-border:#e8e8e8;--c-card:rgba(255,255,255,.75);--c-accent:#000;--c-tag-bg:rgba(0,0,0,.04);--c-tag-text:#555;--radius:12px;--shadow-card:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans SC',-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--c-text);background:var(--c-bg) url('images/bg-paper.jpg') fixed;background-size:cover;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:rgba(255,255,255,.30)}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;transition:background .3s,box-shadow .3s}
.nav.scrolled{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 1px 0 var(--c-border)}
.nav-logo{font-size:15px;font-weight:600;letter-spacing:-.01em;flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:13px;font-weight:500;color:var(--c-sub);transition:color .2s;position:relative}
.nav-links a:hover,.nav-links a.active{color:var(--c-text)}
.nav-links a.active::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1.5px;background:var(--c-text);border-radius:1px}
.lang-switch{margin-left:12px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--c-sub);cursor:pointer;user-select:none;background:none;border:1px solid var(--c-border);border-radius:20px;padding:5px 14px;transition:all .2s}
.lang-switch:hover{border-color:var(--c-text);color:var(--c-text)}
.lang-switch .sep{color:var(--c-border)}.lang-switch .active-lang{color:var(--c-text);font-weight:600}

/* Section */
.section{padding:120px 40px;max-width:1100px;margin:0 auto}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--c-light);margin-bottom:16px}
.section-title{font-size:clamp(28px,5vw,44px);font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:24px}

/* Hero Banner */
.hero-banner{min-height:45vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:120px 40px 80px;max-width:1100px;margin:0 auto;text-align:center}
.hero-banner h1{font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:14px}
.hero-banner .tagline{font-size:16px;color:var(--c-sub);margin-bottom:10px;font-weight:400}

/* Featured */
.featured-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px}
.feat-card{position:relative;border-radius:var(--radius);overflow:hidden;aspect-ratio:4/5;cursor:pointer;background:var(--c-card);transition:transform .3s,box-shadow .3s}
.feat-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.feat-img{width:100%;height:65%;background:linear-gradient(135deg,#e8e8e8,#f5f5f5);overflow:hidden}
.feat-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.feat-card:hover .feat-img img{transform:scale(1.03)}
.feat-info{position:absolute;bottom:0;left:0;right:0;padding:16px 18px;background:linear-gradient(transparent,rgba(255,255,255,.75) 30%,rgba(255,255,255,.9));backdrop-filter:blur(1px);-webkit-backdrop-filter:blur(1px)}
.feat-title{font-size:16px;font-weight:600;line-height:1.3;margin-bottom:4px}
.feat-meta{font-size:12px;color:var(--c-light);display:flex;gap:12px}

/* Works */
.works-category{margin-bottom:80px}
.works-category:last-child{margin-bottom:0}
.cat-header{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--c-border);display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cat-name{font-size:20px;font-weight:700;letter-spacing:-.01em}
.cat-sub{font-size:13px;color:var(--c-light);font-weight:400}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.work-card{background:var(--c-card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s}
.work-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-card)}
.work-thumb{aspect-ratio:4/3;background:linear-gradient(135deg,#eee,#f8f8f8);overflow:hidden}
.work-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.work-card:hover .work-thumb img{transform:scale(1.04)}
.work-info{padding:14px 16px 16px}
.work-name{font-size:14px;font-weight:600;margin-bottom:4px}
.work-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.work-tag{font-size:11px;color:var(--c-tag-text);background:var(--c-tag-bg);padding:3px 10px;border-radius:100px}

/* About */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px 60px;margin-top:40px}
.about-block h3{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:16px}
.edu-item,.exp-item{margin-bottom:20px}
.edu-item:last-child,.exp-item:last-child{margin-bottom:0}
.edu-school{font-weight:600;font-size:15px;margin-bottom:2px}
.edu-degree{font-size:14px;color:var(--c-sub);margin-bottom:2px}
.edu-date{font-size:12px;color:var(--c-light)}
.exp-company{font-weight:600;font-size:15px}
.exp-role{font-size:14px;color:var(--c-sub);margin-bottom:2px}
.exp-date{font-size:12px;color:var(--c-light)}
/* Skills */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px 40px}
.skill-group{margin-bottom:20px}
.skill-group h4{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--c-light);margin-bottom:10px}
.skill-tags{display:flex;gap:8px;flex-wrap:wrap}
.skill-tag{font-size:13px;background:var(--c-tag-bg);color:var(--c-tag-text);padding:6px 14px;border-radius:100px;font-weight:400}

/* Contact */
.contact-wrap{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:32px}
.contact-item{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--c-border);font-size:15px}
.contact-item:first-child{border-top:1px solid var(--c-border)}
.contact-icon{width:40px;height:40px;border-radius:50%;background:var(--c-tag-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.contact-label{font-size:11px;color:var(--c-light);text-transform:uppercase;letter-spacing:.04em}
.contact-value{font-weight:500}
.contact-value a:hover{text-decoration:underline}

/* Detail Modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);overflow-y:auto;display:none;opacity:0;transition:opacity .35s}
.modal-overlay.show{display:block;opacity:1}
.modal-close{position:fixed;top:24px;right:28px;z-index:201;width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.05);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.modal-close:hover{background:rgba(0,0,0,.1);transform:rotate(90deg)}
.modal-content{max-width:920px;margin:0 auto;padding:100px 40px 80px}
.modal-hero{margin-bottom:56px}
.modal-hero .section-label{margin-bottom:24px}
.modal-hero h1{font-size:clamp(30px,5vw,46px);font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:32px}
.modal-meta{display:grid;grid-template-columns:repeat(3,1fr);padding:20px 0;border-top:1px solid var(--c-border);border-bottom:1px solid var(--c-border)}
.modal-meta span{display:flex;flex-direction:column;gap:4px;padding:0 24px}
.modal-meta span:first-child{padding-left:0}
.modal-meta span:not(:last-child){border-right:1px solid var(--c-border)}
.modal-meta span:last-child{padding-right:0}
.modal-meta strong{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--c-light)}
.modal-meta span{font-size:14px;color:var(--c-text)}
.modal-body{font-size:15px;line-height:1.8;color:var(--c-text)}
.modal-section{margin-top:48px}
.modal-section:first-child{margin-top:0}
.modal-section h3{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--c-light);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--c-border)}
.modal-section p{font-size:15px;line-height:1.85;color:var(--c-text)}

/* Editorial Gallery */
.editorial-gallery{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin:48px 0;align-items:start}
.eg-section{grid-column:1/-1;display:flex;align-items:center;gap:14px;margin:20px 0 0}
.eg-section:first-child{margin-top:0}
.eg-section-line-l{width:28px;height:1px;background:var(--c-text);flex-shrink:0}
.eg-section-title{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--c-text);white-space:nowrap}
.eg-section-line-r{flex:1;height:1px;background:var(--c-border)}
.eg-item{position:relative;overflow:hidden;border-radius:var(--radius);cursor:pointer;transition:transform .35s cubic-bezier(.25,.1,.25,1),box-shadow .35s}
.eg-item:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.06)}
.eg-item img{width:100%;display:block;transition:transform .5s cubic-bezier(.25,.1,.25,1)}
.eg-item:hover img{transform:scale(1.03)}
.eg-item figcaption{font-size:12px;color:var(--c-light);margin-top:8px;font-weight:400;line-height:1.4}
.eg-hero{grid-column:1/-1}
.eg-wide{grid-column:span 4}
.eg-half{grid-column:span 3}
.eg-third{grid-column:span 2}

/* Lightbox */
.lb{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center}
.lb.show{display:flex}
.lb img{max-width:80vw;max-height:88vh;object-fit:contain;border-radius:4px;cursor:pointer;transition:opacity .2s}
.lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;background:none;border:none;cursor:pointer;z-index:2}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:2}
.lb-nav:hover{background:rgba(255,255,255,.25)}
.lb-prev{left:24px}
.lb-next{right:24px}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:14px;font-family:var(--f-sans)}

/* Footer */
.footer{text-align:center;padding:40px;font-size:12px;color:var(--c-light);border-top:1px solid var(--c-border)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s ease-out both}
.fade-up:nth-child(1){animation-delay:0s}
.fade-up:nth-child(2){animation-delay:.1s}
.fade-up:nth-child(3){animation-delay:.2s}
.fade-up:nth-child(4){animation-delay:.3s}

/* Responsive */
@media(max-width:768px){
  .nav{padding:0 20px;height:56px}
  .nav-links{display:none}
  .section{padding:80px 20px}
  .hero-banner{padding:100px 20px 60px}
  .featured-grid{grid-template-columns:1fr;gap:12px}
  .works-grid{grid-template-columns:repeat(2,1fr)}
  .about-grid{grid-template-columns:1fr;gap:40px}
  .skills-grid{grid-template-columns:1fr}
  .contact-wrap{grid-template-columns:1fr}
  .modal-content{padding:80px 20px 60px}
  .modal-meta{grid-template-columns:1fr;padding:0}
  .modal-meta span{padding:14px 0!important;border-right:none!important;border-bottom:1px solid var(--c-border)}
  .modal-meta span:last-child{border-bottom:none}
  .editorial-gallery{grid-template-columns:1fr;gap:12px}
  .eg-hero,.eg-wide,.eg-half,.eg-third{grid-column:1/-1}
  .lb-nav{width:44px;height:44px;font-size:28px}
  .lb-prev{left:12px}
  .lb-next{right:12px}
  .lb img{max-width:88vw;max-height:80vh}
}
@media(max-width:480px){
  .works-grid{grid-template-columns:1fr}
}
</style>

<!-- Footer -->

  <button class="lb-nav lb-next" onclick="navLb(1,event)">›</button>

</div>

function t(key) { return (I18N[L] && I18N[L][key]) || key; }

// Featured
function renderFeatured() {
  var g = document.getElementById('featured-grid');
  g.innerHTML = FEATURED.map(function(f, i) {
    var d = p(f);
    return '<div class="feat-card fade-up" style="animation-delay:'+(i*.08)+'s" onclick="openDetail(\''+f.id+'\')">' +
      (f.img ? '<div class="feat-img"><img src="'+f.img+'" alt="'+d.title+'" loading="lazy"></div>' : '<div class="feat-img" style="background:linear-gradient(135deg,'+gradColors(i)+')"></div>') +

  }).join('');
}

function gradColors(i) {
  var cs = ['#f0f0f0,#e8e8e8','#e8ecf4,#dfe4f0','#f4efe8,#ede4d8','#eaf0f0,#dde8e8','#f0eef4,#e4e0f0','#eef4f0,#e0f0e8'];
  return cs[i % cs.length];
}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function openDetail(id) {
  var d = DETAIL[id]; if (!d) return;
  var dd = p(d);
  var ov = document.getElementById('modal-overlay');
  var ct = document.getElementById('modal-content');

  // Build editorial gallery
  var galHtml = '';
  var galImgs = [];
  if (d.gallery && d.gallery.length > 0) {
    if (typeof d.gallery[0] === 'object') {
      // Structured editorial gallery
      galImgs = d.gallery.filter(function(it){return it.type==='image'}).map(function(it){return it.src});
      galHtml = '<div class="editorial-gallery">';
      d.gallery.forEach(function(item) {
        if (item.type === 'section') {
          galHtml += '<div class="eg-section"><span class="eg-section-line-l"></span><span class="eg-section-title">' + p(item) + '</span><span class="eg-section-line-r"></span></div>';
        } else if (item.type === 'image') {
          var idx = galImgs.indexOf(item.src);
          galHtml += '<figure class="eg-item eg-' + item.layout + '" onclick="openLb(' + idx + ')"><img src="' + item.src + '" alt="' + p(item) + '" loading="lazy"><figcaption>' + p(item) + '</figcaption></figure>';
        }
      });
      galHtml += '</div>';
    } else {
      // Simple array gallery (legacy)
      galImgs = d.gallery.slice();
      galHtml = '<div class="editorial-gallery">' +
        d.gallery.map(function(src, i) {
          return '<figure class="eg-item eg-half" onclick="openLb(' + i + ')"><img src="' + src + '" loading="lazy"></figure>';
        }).join('') + '</div>';
    }
  } else {
    var phTxt = L === 'cn' ? '项目图片即将上线' : 'Project images coming soon';
    galHtml = '<div class="editorial-gallery"><figure class="eg-item eg-hero" style="aspect-ratio:16/9;background:linear-gradient(135deg,#f5f5f5,#eee);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:#ccc;font-size:14px">' + phTxt + '</figure></div>';
  }
  window.currentGalImgs = galImgs;

  ct.innerHTML =
    '<div class="modal-hero">' +
      '<div class="section-label">' + (L==='cn' ? '项目详情':'Project Detail') + '</div>' +
      '<h1>' + dd.title + '</h1>' +
      '<div class="modal-meta">' +
        '<span><strong>' + t('detail.role') + '</strong>' + dd.role + '</span>' +
        '<span><strong>' + t('detail.timeline') + '</strong>' + dd.timeline + '</span>' +
        '<span><strong>' + t('detail.tools') + '</strong>' + dd.tools + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="modal-body">' +
      '<div class="modal-section"><h3>' + t('detail.overview') + '</h3><p>' + dd.overview + '</p></div>' +
      galHtml +
      (dd.responsibility ? '<div class="modal-section"><h3>' + t('detail.responsibility') + '</h3><p>' + dd.responsibility.replace(/\n/g, '<br>') + '</p></div>' : '') +
      (dd.process ? '<div class="modal-section"><h3>' + t('detail.process') + '</h3><p>' + dd.process + '</p></div>' : '') +
      (dd.outcome ? '<div class="modal-section"><h3>' + t('detail.outcome') + '</h3><p>' + dd.outcome + '</p></div>' : '') +
    '</div>';
  ov.classList.add('show');
  document.body.style.overflow = 'hidden';
  ov.scrollTop = 0;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════════════════════
function openLb(idx) {
  var imgs = window.currentGalImgs || [];
  if (imgs.length === 0) return;
  window.lbIndex = Math.max(0, Math.min(idx, imgs.length - 1));
  var img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.src = imgs[window.lbIndex];
  img.onload = function() { img.style.opacity = '1'; };
  var counter = document.getElementById('lb-counter');
  counter.textContent = (window.lbIndex + 1) + ' / ' + imgs.length;
  document.getElementById('lb').classList.add('show');
}
function navLb(dir, e) {
  if (e) e.stopPropagation();
  var imgs = window.currentGalImgs || [];
  if (imgs.length === 0) return;
  window.lbIndex = (window.lbIndex + dir + imgs.length) % imgs.length;
  var img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.src = imgs[window.lbIndex];
  img.onload = function() { img.style.opacity = '1'; };
  var counter = document.getElementById('lb-counter');
  counter.textContent = (window.lbIndex + 1) + ' / ' + imgs.length;
}
function closeLb(e) {
  if (e) e.stopPropagation();
  document.getElementById('lb').classList.remove('show');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeModal(); closeLb(); }
  if (document.getElementById('lb').classList.contains('show')) {
    if (e.key === 'ArrowLeft') navLb(-1);
    if (e.key === 'ArrowRight') navLb(1);
  }
});

// LANGUAGE SWITCH

function toggleLang() {
  L = L === 'cn' ? 'en' : 'cn';
  document.documentElement.lang = L === 'cn' ? 'zh-CN' : 'en';
  document.getElementById('lang-cn').className = L === 'cn' ? 'active-lang' : '';
  document.getElementById('lang-en').className = L === 'en' ? 'active-lang' : '';
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    el.textContent = I18N[L] && I18N[L][k] || k;
  });
  refreshAll();
  var wasOpen = document.getElementById('modal-overlay').classList.contains('show');
  if (wasOpen) closeModal();
}

function refreshAll() {
  renderFeatured();
  renderWorks();
  renderEdu();
  renderExp();
  renderSkills();
  renderContact();
  document.getElementById('footer-year').textContent = new Date().getFullYear();
}

// ═══════════════════════════════════════════════════════════════
// NAV scroll spy & init
// ═══════════════════════════════════════════════════════════════
var sections = ['works', 'about', 'contact'];
window.addEventListener('scroll', function() {
  var nav = document.getElementById('nav');
  nav.classList.toggle('scrolled', window.scrollY > 50);

  var current = 'home';
  sections.forEach(function(s) {
    var el = document.getElementById(s);
    if (el && window.scrollY >= el.offsetTop - 100) current = s;
  });
  document.querySelectorAll('#nav-links a').forEach(function(a) {
    a.classList.toggle('active', a.getAttribute('data-nav') === current);
  });
});

// Init
refreshAll();
document.getElementById('footer-year').textContent = new Date().getFullYear();
document.getElementById('lang-cn').className = 'active-lang';
