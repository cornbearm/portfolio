<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="keywords" content="毛雨杭, Mao Yuhang, 视觉设计, 品牌设计, IP衍生品, AIGC, 作品集, Portfolio, Designer">
<meta property="og:title" content="毛雨杭 Mao Yuhang · Portfolio">
<meta property="og:description" content="视觉设计 · IP衍生品 · AIGC创作">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preload" as="image" href="images/cat-game/poster.jpg">
<link rel="preload" as="image" href="images/jiyouqu/poster.jpg">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   KATHY-INSPIRED DARK PORTFOLIO · MAO YUHANG
   ═══════════════════════════════════════════════════════════════ */
:root{
  --bg:#0f0e0e;
  --bg-2:#161515;
  --text:#ffffff;
  --sub:rgba(255,255,255,.62);
  --light:rgba(255,255,255,.42);
  --border:rgba(255,255,255,.10);
  --border-strong:rgba(255,255,255,.22);
  --accent:#b455ff;
  --accent-soft:rgba(180,85,255,.15);
  --tag-bg:rgba(255,255,255,.05);
  --card-bg:rgba(255,255,255,.03);
  --shadow:0 20px 60px rgba(0,0,0,.4);
  --f-display:'Outfit','Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
  --f-body:'Inter','Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--f-body);
  color:var(--text);
  background:var(--bg);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
  font-weight:400;
  font-size:15px;
  letter-spacing:-.01em;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* Selection */
::selection{background:var(--accent);color:#fff}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25)}

/* ═══════════════════════════════════════════════════════════════
   NAV
   ═══════════════════════════════════════════════════════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0 48px;height:80px;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  transition:background .3s,backdrop-filter .3s,border-color .3s;
  border-bottom:1px solid transparent;
}
.nav.scrolled{
  background:rgba(15,14,14,.75);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom-color:var(--border);
}
.nav-logo{
  font-family:var(--f-display);
  font-size:13px;font-weight:500;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--text);justify-self:start;
}
.nav-links{display:flex;align-items:center;gap:36px;justify-self:center}
.nav-links a{
  font-size:13px;font-weight:400;
  letter-spacing:.04em;text-transform:uppercase;
  color:var(--sub);transition:color .2s;
  padding:6px 0;position:relative;
}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-links a.active::after{
  content:'';position:absolute;left:50%;bottom:0;
  width:4px;height:4px;border-radius:50%;
  background:var(--accent);
  transform:translateX(-50%);
}
.nav-right{justify-self:end;display:flex;align-items:center;gap:18px}
.lang-switch{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:400;
  letter-spacing:.04em;text-transform:uppercase;
  color:var(--sub);user-select:none;
  padding:6px 0;transition:color .2s;
}
.lang-switch:hover{color:var(--text)}
.lang-switch .sep{color:var(--light);margin:0 2px}
.lang-switch .active-lang{color:var(--text);font-weight:500}
.nav-year{
  font-size:13px;color:var(--light);
  letter-spacing:.04em;
  font-family:var(--f-display);
}

/* ═══════════════════════════════════════════════════════════════
   HERO + ABOUT (Combined 3-col layout like Kathy)
   ═══════════════════════════════════════════════════════════════ */
.hero-section{
  min-height:100vh;
  padding:140px 48px 100px;
  max-width:1320px;margin:0 auto;
  position:relative;
}
.hero-greeting{
  font-family:var(--f-display);
  font-size:clamp(48px,7.5vw,96px);
  font-weight:300;line-height:1;
  letter-spacing:-.035em;
  color:var(--text);
  margin-bottom:80px;
  display:flex;flex-wrap:wrap;align-items:baseline;gap:0 .4em;
}
.hero-greeting .name{
  font-style:italic;
  color:var(--accent);
  font-weight:300;
}
.hero-tagline{
  font-size:14px;color:var(--sub);
  text-transform:uppercase;letter-spacing:.06em;
  line-height:1.7;max-width:520px;
  margin-top:-60px;margin-bottom:80px;
  margin-left:2px;
}

.about-grid{
  display:grid;
  grid-template-columns:minmax(220px,1fr) 1.4fr 1.2fr;
  gap:60px;
  margin-top:60px;
  align-items:start;
}
.about-photo{
  position:relative;
  aspect-ratio:3/4;
  border-radius:18px;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(180,85,255,.18),rgba(180,85,255,.04));
}
.about-photo-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-display);
  font-size:120px;font-weight:200;
  color:rgba(180,85,255,.5);
  letter-spacing:-.05em;
}
.about-col h4{
  font-family:var(--f-display);
  font-size:24px;font-weight:400;
  color:var(--accent);
  margin-bottom:28px;
  letter-spacing:-.01em;
}
.about-list{list-style:none}
.about-item{
  position:relative;
  padding-left:20px;
  padding-bottom:24px;
  border-left:1px solid var(--border);
  margin-left:6px;
}
.about-item::before{
  content:'';position:absolute;
  left:-4.5px;top:6px;
  width:8px;height:8px;
  border-radius:50%;
  background:var(--text);
}
.about-item .date{
  display:block;
  font-size:12px;color:var(--light);
  text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:6px;font-weight:400;
}
.about-item .title{
  display:block;
  font-size:14px;color:var(--text);
  font-weight:500;line-height:1.4;
  text-transform:uppercase;letter-spacing:.02em;
  margin-bottom:2px;
}
.about-item .sub{
  display:block;
  font-size:13px;color:var(--sub);
  line-height:1.5;
  text-transform:uppercase;letter-spacing:.02em;
}
.about-item .org{
  display:block;
  font-size:12px;color:var(--light);
  text-transform:uppercase;letter-spacing:.04em;
  margin-top:2px;
}

/* Skills grid (rounded squares) */
.skills-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:24px;
}
.skill-card{
  aspect-ratio:1;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-display);
  font-size:18px;font-weight:500;
  color:var(--text);
  letter-spacing:-.01em;
  transition:all .25s;
  text-align:center;
  padding:6px;
  line-height:1.1;
}
.skill-card:hover{
  background:var(--accent-soft);
  border-color:var(--accent);
  color:var(--accent);
}
.skill-card .abbrev{
  display:block;
  font-size:22px;font-weight:600;
}

/* ═══════════════════════════════════════════════════════════════
   SECTION HEADERS
   ═══════════════════════════════════════════════════════════════ */
.section-title-display{
  font-family:var(--f-display);
  font-size:clamp(48px,7vw,80px);
  font-weight:300;line-height:1;
  letter-spacing:-.04em;
  color:var(--text);
  text-align:center;
  margin:120px auto 80px;
  max-width:1320px;
  padding:0 48px;
}
.section-eyebrow{
  font-size:12px;color:var(--light);
  text-transform:uppercase;letter-spacing:.1em;
  text-align:center;
  margin-bottom:16px;
}

/* ═══════════════════════════════════════════════════════════════
   FEATURED PROJECTS (Asymmetric 1/3 + 2/3)
   ═══════════════════════════════════════════════════════════════ */
.featured-wrap{
  max-width:1320px;margin:0 auto;
  padding:0 48px;
}
.featured-grid{
  display:flex;flex-direction:column;gap:120px;
}
.feat-row{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:60px;
  align-items:end;
  cursor:pointer;
  transition:transform .4s cubic-bezier(.25,.1,.25,1);
}
.feat-row:hover{transform:translateY(-4px)}
.feat-row.reverse{grid-template-columns:2fr 1fr}
.feat-row.reverse .feat-media{order:2}
.feat-row.reverse .feat-info{order:1;text-align:right;align-items:flex-end}

.feat-media{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(180,85,255,.15),rgba(180,85,255,.02));
  aspect-ratio:4/3;
}
.feat-media img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .6s cubic-bezier(.25,.1,.25,1);
}
.feat-row:hover .feat-media img{transform:scale(1.04)}
.feat-info{
  display:flex;flex-direction:column;
  gap:14px;align-items:flex-start;
}
.feat-award-tag{
  display:inline-block;
  font-size:11px;color:var(--accent);
  background:var(--accent-soft);
  padding:5px 12px;border-radius:99px;
  text-transform:uppercase;letter-spacing:.06em;
  font-weight:500;
}
.feat-title{
  font-family:var(--f-display);
  font-size:clamp(36px,4.5vw,56px);
  font-weight:400;line-height:1.05;
  letter-spacing:-.03em;
  color:var(--text);
}
.feat-subtitle{
  font-size:13px;color:var(--sub);
  text-transform:uppercase;letter-spacing:.04em;
  line-height:1.5;max-width:440px;
}
.feat-links{
  display:flex;flex-wrap:wrap;gap:18px;
  margin-top:8px;
}
.feat-row.reverse .feat-links{justify-content:flex-end}
.feat-links a{
  font-size:13px;color:var(--text);
  text-transform:uppercase;letter-spacing:.04em;
  font-weight:400;
  display:inline-flex;align-items:center;gap:6px;
  padding-bottom:3px;
  border-bottom:1px solid var(--border-strong);
  transition:border-color .2s,color .2s;
}
.feat-links a:hover{
  color:var(--accent);border-color:var(--accent);
}
.feat-link-arrow{font-size:10px;opacity:.7;line-height:1}

/* ═══════════════════════════════════════════════════════════════
   WORKS (Categories with cards)
   ═══════════════════════════════════════════════════════════════ */
.works-wrap{
  max-width:1320px;margin:0 auto;
  padding:0 48px;
}
.works-category{margin-bottom:100px}
.works-category:last-child{margin-bottom:0}
.cat-header{
  display:flex;align-items:baseline;
  justify-content:space-between;
  flex-wrap:wrap;gap:8px;
  margin-bottom:32px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.cat-name{
  font-family:var(--f-display);
  font-size:28px;font-weight:400;
  letter-spacing:-.02em;color:var(--text);
}
.cat-sub{
  font-size:12px;color:var(--light);
  text-transform:uppercase;letter-spacing:.06em;
}
.works-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
}
.work-card{
  cursor:pointer;
  transition:transform .35s cubic-bezier(.25,.1,.25,1);
}
.work-card:hover{transform:translateY(-3px)}
.work-thumb{
  aspect-ratio:1;
  border-radius:12px;overflow:hidden;
  background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  margin-bottom:14px;
  border:1px solid var(--border);
}
.work-thumb img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .5s;
}
.work-card:hover .work-thumb img{transform:scale(1.04)}
.work-name{
  font-size:15px;font-weight:500;
  color:var(--text);line-height:1.3;
  margin-bottom:8px;
}
.work-tags{display:flex;gap:6px;flex-wrap:wrap}
.work-tag{
  font-size:11px;
  color:var(--sub);
  text-transform:uppercase;letter-spacing:.04em;
  font-weight:400;
}

/* ═══════════════════════════════════════════════════════════════
   CONTACT
   ═══════════════════════════════════════════════════════════════ */
.contact-section{
  max-width:1320px;
  margin:0 auto;
  padding:100px 48px 80px;
  text-align:center;
}
.contact-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-top:60px;
}
.contact-item{
  background:var(--bg);
  padding:36px 24px;
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  transition:background .25s;
}
.contact-item:hover{background:var(--card-bg)}
.contact-label{
  font-size:11px;color:var(--light);
  text-transform:uppercase;letter-spacing:.08em;
  font-weight:500;
}
.contact-value{
  font-size:16px;color:var(--text);
  font-weight:500;
  letter-spacing:-.01em;
}
.contact-value a{transition:color .2s}
.contact-value a:hover{color:var(--accent)}
.contact-cta{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:40px;
  padding:14px 32px;
  background:var(--text);color:var(--bg);
  border-radius:99px;
  font-size:13px;font-weight:500;
  text-transform:uppercase;letter-spacing:.06em;
  transition:transform .25s,background .25s;
}
.contact-cta:hover{
  background:var(--accent);color:#fff;
  transform:translateY(-2px);
}

/* ═══════════════════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════════════════ */
.footer{
  text-align:center;
  padding:40px 48px;
  font-size:12px;
  color:var(--light);
  text-transform:uppercase;letter-spacing:.06em;
  border-top:1px solid var(--border);
  margin-top:80px;
}

/* ═══════════════════════════════════════════════════════════════
   DETAIL MODAL
   ═══════════════════════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(15,14,14,.96);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  overflow-y:auto;display:none;opacity:0;
  transition:opacity .35s;
}
.modal-overlay.show{display:block;opacity:1}
.modal-close{
  position:fixed;top:24px;right:28px;
  z-index:201;width:42px;height:42px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  border:none;color:var(--text);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
}
.modal-close:hover{
  background:rgba(255,255,255,.18);
  transform:rotate(90deg);
}
.modal-content{
  max-width:920px;
  margin:0 auto;
  padding:120px 48px 80px;
}
.modal-hero{margin-bottom:60px}
.modal-hero .section-eyebrow{margin-bottom:24px;text-align:left}
.modal-hero h1{
  font-family:var(--f-display);
  font-size:clamp(40px,5vw,64px);
  font-weight:300;letter-spacing:-.03em;
  line-height:1.05;margin-bottom:32px;
}
.modal-award{
  display:inline-block;
  font-size:12px;color:var(--accent);
  background:var(--accent-soft);
  padding:6px 14px;border-radius:99px;
  text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:24px;
  font-weight:500;
}
.modal-subtitle{
  font-size:14px;color:var(--sub);
  text-transform:uppercase;letter-spacing:.04em;
  margin-bottom:24px;
  line-height:1.6;
}
.modal-links{display:flex;flex-wrap:wrap;gap:18px;margin-top:20px}
.modal-link-btn{
  display:inline-block;
  padding:12px 28px;
  background:var(--text);color:var(--bg);
  border-radius:99px;
  font-size:13px;font-weight:500;
  letter-spacing:.04em;text-transform:uppercase;
  text-decoration:none;
  transition:background .2s,transform .2s;
}
.modal-link-btn:hover{
  background:var(--accent);color:#fff;
  transform:translateY(-2px);
}
.modal-meta{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--border);
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  margin-top:24px;
}
.modal-meta-cell{
  background:var(--bg);
  padding:20px 24px;
  display:flex;flex-direction:column;gap:6px;
}
.modal-meta-cell .label{
  font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:.1em;
  color:var(--light);
}
.modal-meta-cell .value{
  font-size:14px;color:var(--text);
  line-height:1.4;
}
.modal-section{margin-top:60px}
.modal-section .label{
  font-size:11px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--light);margin-bottom:20px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.modal-section p{
  font-size:16px;line-height:1.85;
  color:var(--text);
  font-weight:300;
  white-space:pre-line;
}
.modal-section .gallery{
  display:grid;grid-template-columns:1fr;
  gap:20px;margin-top:8px;
}
.modal-section .gallery img,
.modal-section .gallery video{
  width:100%;border-radius:12px;
  cursor:pointer;
  background:var(--card-bg);
}

/* ═══════════════════════════════════════════════════════════════
   QR MODAL
   ═══════════════════════════════════════════════════════════════ */
.qr-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(15,14,14,.96);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity .25s;
}
.qr-overlay.show{display:flex;opacity:1}
.qr-box{
  position:relative;
  width:min(380px,90vw);
  background:#1a1a1a;
  border:1px solid var(--border);
  border-radius:18px;
  padding:40px 28px 28px;
  text-align:center;
  box-shadow:var(--shadow);
  animation:qrPop .35s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes qrPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.qr-close{
  position:absolute;top:14px;right:14px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.08);border:none;
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;color:var(--sub);
}
.qr-close:hover{background:rgba(255,255,255,.16);color:var(--text);transform:rotate(90deg)}
.qr-title{
  font-family:var(--f-display);
  font-size:22px;font-weight:400;
  letter-spacing:-.02em;
  margin-bottom:6px;color:var(--text);
}
.qr-sub{
  font-size:12px;color:var(--sub);
  text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:20px;
}
.qr-canvas-wrap{
  display:flex;justify-content:center;
  padding:18px;
  background:#fff;border-radius:14px;
  margin-bottom:18px;
}
#qr-canvas{display:flex;justify-content:center}
#qr-canvas canvas,#qr-canvas img{border-radius:6px}
.qr-tip{
  font-size:12px;color:var(--light);
  margin-bottom:14px;line-height:1.5;
  text-transform:uppercase;letter-spacing:.04em;
}
.qr-scheme-link{
  display:block;padding:12px 16px;
  background:var(--text);color:var(--bg);
  border-radius:99px;
  font-size:12px;font-weight:500;
  text-transform:uppercase;letter-spacing:.06em;
  text-decoration:none;
  margin-bottom:10px;
  transition:background .2s;
}
.qr-scheme-link:hover{background:var(--accent);color:#fff}
.qr-copy{
  width:100%;padding:12px 16px;
  background:transparent;color:var(--text);
  border:1px solid var(--border-strong);
  border-radius:99px;
  font-size:12px;cursor:pointer;
  text-transform:uppercase;letter-spacing:.06em;
  transition:all .2s;
  font-family:inherit;font-weight:500;

.qr-copy:hover{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ═══════════════════════════════════════════════════════════════
   LIGHTBOX
   ═══════════════════════════════════════════════════════════════ */
.lb{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.95);
  display:none;align-items:center;justify-content:center;
}
.lb.show{display:flex}
.lb img{
  max-width:86vw;max-height:90vh;
  object-fit:contain;border-radius:6px;
  cursor:pointer;transition:opacity .2s;
}
.lb-close{
  position:absolute;top:20px;right:24px;
  color:#fff;font-size:24px;
  background:none;border:none;cursor:pointer;
  z-index:2;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  transition:background .2s;
}
.lb-close:hover{background:rgba(255,255,255,.15)}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,.10);
  border:none;color:#fff;
  font-size:32px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;z-index:2;
}
.lb-nav:hover{background:rgba(255,255,255,.22)}
.lb-prev{left:24px}
.lb-next{right:24px}
.lb-counter{
  position:absolute;bottom:24px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,.65);
  font-size:13px;
  text-transform:uppercase;letter-spacing:.04em;
}

// HELPERS

function t(key) { return (I18N[L] && I18N[L][key]) || key; }
function p(obj) { return obj && typeof obj[L] !== 'undefined' ? obj[L] : obj; }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// RENDER: FEATURED (Asymmetric grid)
// ═══════════════════════════════════════════════════════════════
function renderFeatured() {
  var g = document.getElementById('featured-grid');
  g.innerHTML = FEATURED.map(function(f, i) {
    var d = p(f);
    var a = f.award ? (L === 'cn' ? f.award.cn : f.award.en) : '';
    var s = f.subtitle ? (L === 'cn' ? f.subtitle.cn : f.subtitle.en) : '';
    var reverse = (i % 2 === 1) ? ' reverse' : '';
    var awardHtml = a ? '<div class="feat-award-tag">' + esc(a) + '</div>' : '';
    var subtitleHtml = s ? '<div class="feat-subtitle">' + esc(s) + '</div>' : '';
    var linksHtml = '';
    if (f.links && f.links.length) {
      linksHtml = '<div class="feat-links">' + f.links.map(function(lk) {
        var nm = L === 'cn' ? lk.cn : lk.en;
        var arrow = '<span class="feat-link-arrow">↗</span>';
        if (lk.scheme) {
          var encUrl = encodeURIComponent(lk.url);
          var encImg = lk.qrImg ? encodeURIComponent(lk.qrImg) : '';
          return '<a href="javascript:void(0)" onclick="event.stopPropagation();openShopQR(\''+encUrl+'\',\''+esc(nm)+'\',\''+encImg+'\')">' + esc(nm) + ' ' + arrow + '</a>';
        }
        return '<a href="' + lk.url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(nm) + ' ' + arrow + '</a>';
      }).join('') + '</div>';
    }
    var imgHtml = f.img
      ? '<div class="feat-media"><img src="'+f.img+'" alt="'+esc(d.title)+'" loading="lazy" decoding="async"></div>'
      : '<div class="feat-media"></div>';
    return '<div class="feat-row'+reverse+' fade-up" style="animation-delay:'+(i*.1)+'s" onclick="openDetail(\''+f.id+'\')">' +
      imgHtml +
      '<div class="feat-info">' + awardHtml + '<div class="feat-title">' + esc(d.title) + '</div>' + subtitleHtml + linksHtml + '</div>' +
    '</div>';
  }).join('');
}

// RENDER: SKILLS (rounded squares)
// ═══════════════════════════════════════════════════════════════
function renderSkills() {
  // Combine all skills, dedupe
  var allSkills = [];
  var seen = {};
  SKILLS.forEach(function(g) {
    g.tags.forEach(function(tag) {
      if (!seen[tag]) {
        seen[tag] = true;
        allSkills.push({ name: tag, abbrev: SKILL_ABBREV[tag] || tag.substring(0, 2) });
      }
    });
  });
  var html = allSkills.map(function(s) {
    return '<div class="skill-card" title="' + esc(s.name) + '"><span class="abbrev">' + esc(s.abbrev) + '</span></div>';
  }).join('');
  document.getElementById('skills-grid').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// MODAL: Project Detail
// ═══════════════════════════════════════════════════════════════
function openDetail(id) {
  var d = DETAIL[id];
  if (!d) return;
  var data = L === 'cn' ? d.cn : d.en;
  var awardHtml = '';
  // Look up award from FEATURED
  var f = FEATURED.find(function(x) { return x.id === id; });
  if (f && f.award) {
    awardHtml = '<div class="modal-award">' + esc(L === 'cn' ? f.award.cn : f.award.en) + '</div>';
  }
  var subtitleHtml = '';
  if (f && f.subtitle) {
    subtitleHtml = '<div class="modal-subtitle">' + esc(L === 'cn' ? f.subtitle.cn : f.subtitle.en) + '</div>';
  }
  var linksHtml = '';
  if (f && f.links && f.links.length) {
    linksHtml = '<div class="modal-links">' + f.links.map(function(lk) {
      var nm = L === 'cn' ? lk.cn : lk.en;
      if (lk.scheme) {
        var encUrl = encodeURIComponent(lk.url);
        var encImg = lk.qrImg ? encodeURIComponent(lk.qrImg) : '';
        return '<a href="javascript:void(0)" class="modal-link-btn" onclick="event.stopPropagation();openShopQR(\''+encUrl+'\',\''+esc(nm)+'\',\''+encImg+'\')">' + esc(nm) + ' ↗</a>';
      }
      return '<a href="' + lk.url + '" target="_blank" rel="noopener" class="modal-link-btn" onclick="event.stopPropagation()">' + esc(nm) + ' ↗</a>';
    }).join('') + '</div>';
  }
  var galleryHtml = '';
  if (d.gallery && d.gallery.length) {
    window.currentGalImgs = d.gallery.filter(function(g) { return g.type === 'image'; }).map(function(g) { return g.src; });
    var items = d.gallery.map(function(g, idx) {
      var cap = L === 'cn' ? g.cn : g.en;
      if (g.type === 'video') {
        return '<video src="' + g.src + '" controls playsinline></video>';
      }
      var imgIdx = d.gallery.slice(0, idx + 1).filter(function(x) { return x.type === 'image'; }).length - 1;
      return '<img src="' + g.src + '" alt="' + esc(cap) + '" onclick="event.stopPropagation();openLb(' + imgIdx + ')">';
    }).join('');
    galleryHtml = '<div class="modal-section"><div class="label">' + t('detail.gallery') + '</div><div class="gallery">' + items + '</div></div>';
  }
  var html =
    '<div class="modal-hero">' +
      awardHtml +
      '<h1>' + esc(data.title) + '</h1>' +
      subtitleHtml +
      linksHtml +
      '<div class="modal-meta">' +
        '<div class="modal-meta-cell"><span class="label">' + t('detail.role') + '</span><span class="value">' + esc(data.role) + '</span></div>' +
        '<div class="modal-meta-cell"><span class="label">' + t('detail.timeline') + '</span><span class="value">' + esc(data.timeline) + '</span></div>' +
        '<div class="modal-meta-cell"><span class="label">' + t('detail.tools') + '</span><span class="value">' + esc(data.tools) + '</span></div>' +
      '</div>' +
    '</div>' +
    (data.overview ? '<div class="modal-section"><div class="label">' + t('detail.overview') + '</div><p>' + esc(data.overview) + '</p></div>' : '') +
    (data.process ? '<div class="modal-section"><div class="label">' + t('detail.process') + '</div><p>' + esc(data.process) + '</p></div>' : '') +
    (data.responsibility ? '<div class="modal-section"><div class="label">' + t('detail.responsibility') + '</div><p>' + esc(data.responsibility) + '</p></div>' : '') +
    (data.outcome ? '<div class="modal-section"><div class="label">' + t('detail.outcome') + '</div><p>' + esc(data.outcome) + '</p></div>' : '') +
    galleryHtml;
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function openWorkDetail(id) {
  // For work cards, find the project and show a simple modal
  var item = null, parentCat = null;
  WORKS.forEach(function(cat) {
    cat.items.forEach(function(it) { if (it.id === id) { item = it; parentCat = cat; } });
  });
  if (!item) return;
  var d = L === 'cn' ? item.cn : item.en;
  var html =
    '<div class="modal-hero">' +
      '<div class="section-eyebrow" style="text-align:left">' + esc(L === 'cn' ? parentCat.cn.name : parentCat.en.name) + '</div>' +
      '<h1>' + esc(d.title) + '</h1>' +
      (d.tags && d.tags.length ? '<div class="work-tags" style="margin-top:16px">' + d.tags.map(function(t) { return '<span class="work-tag">' + esc(t) + '</span>'; }).join('') + '</div>' : '') +
    '</div>' +

  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════════════════════════
// WECHAT SHOP QR MODAL
// ═══════════════════════════════════════════════════════════════
var _qrSchemeUrl = '';
var _qrImgPath = '';
function openShopQR(encodedUrl, label, encodedImg) {
  if (event && event.stopPropagation) event.stopPropagation();
  _qrSchemeUrl = decodeURIComponent(encodedUrl);
  _qrImgPath = encodedImg ? decodeURIComponent(encodedImg) : '';
  var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  var isWeixin = /MicroMessenger/i.test(navigator.userAgent);
  document.getElementById('qr-title').textContent = label;
  document.getElementById('qr-sub').textContent = t('qr.scan');
  document.getElementById('qr-tip').textContent = t('qr.tip');
  var schemeA = document.getElementById('qr-scheme-link');
  schemeA.href = _qrSchemeUrl;
  schemeA.textContent = t('qr.open');
  document.getElementById('qr-copy').textContent = t('qr.copy');
  if (isMobile && isWeixin) {
    window.location.href = _qrSchemeUrl;
    return;
  }
  if (isMobile) {
    var t0 = Date.now();
    window.location.href = _qrSchemeUrl;
    setTimeout(function() {
      if (Date.now() - t0 < 2000) showQrModal();
    }, 1500);
    return;
  }
  showQrModal();
}
function showQrModal() {
  var box = document.getElementById('qr-overlay');
  box.classList.add('show');
  document.body.style.overflow = 'hidden';
  var target = document.getElementById('qr-canvas');
  target.innerHTML = '';
  if (_qrImgPath) {
    target.innerHTML = '<img src="' + _qrImgPath + '" alt="QR Code" style="width:240px;height:240px;display:block;object-fit:contain">';
    return;
  }
  try {
    var qr = qrcode(0, 'M');
    qr.addData(_qrSchemeUrl);
    qr.make();
    var imgTag = qr.createImgTag(5, 0);
    target.innerHTML = imgTag;
    var im = target.querySelector('img');
    if (im) { im.style.width = '200px'; im.style.height = '200px'; im.style.display = 'block'; }
  } catch (e) {
    target.innerHTML = '<div style="padding:20px;font-size:12px;color:#999">二维码加载失败</div>';
  }
}
function closeShopQR(ev) {
  if (ev && ev.target && ev.target.closest('.qr-box') && !ev.target.classList.contains('qr-close')) return;
  document.getElementById('qr-overlay').classList.remove('show');
  document.body.style.overflow = '';
  var btn = document.getElementById('qr-copy');
  if (btn) { btn.classList.remove('copied'); btn.textContent = t('qr.copy'); }
}
function copyShopURL() {
  var btn = document.getElementById('qr-copy');
  var doneTxt = t('qr.copied');
  var copyTxt = t('qr.copy');
  var fallback = function() {
    var ta = document.createElement('textarea');
    ta.value = _qrSchemeUrl;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(_qrSchemeUrl).catch(fallback);
  } else { fallback(); }
  btn.classList.add('copied');
  btn.textContent = doneTxt;
  setTimeout(function() { btn.classList.remove('copied'); btn.textContent = copyTxt; }, 1800);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var q = document.getElementById('qr-overlay');
    if (q && q.classList.contains('show')) closeShopQR();
  }
});

// ═══════════════════════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════════════════════
function openLb(idx) {
  var imgs = window.currentGalImgs || [];
  if (imgs.length === 0) return;
  window.lbIndex = Math.max(0, Math.min(idx, imgs.length - 1));
  var img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.src = imgs[window.lbIndex];
  img.onload = function() { img.style.opacity = '1'; };
  document.getElementById('lb-counter').textContent = (window.lbIndex + 1) + ' / ' + imgs.length;
  document.getElementById('lb').classList.add('show');
}
function navLb(dir, e) {
  if (e) e.stopPropagation();
  var imgs = window.currentGalImgs || [];
  if (imgs.length === 0) return;
  window.lbIndex = (window.lbIndex + dir + imgs.length) % imgs.length;
  var img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.src = imgs[window.lbIndex];
  img.onload = function() { img.style.opacity = '1'; };
  document.getElementById('lb-counter').textContent = (window.lbIndex + 1) + ' / ' + imgs.length;
}
function closeLb(e) {
  if (e) e.stopPropagation();
  document.getElementById('lb').classList.remove('show');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeModal(); closeLb(); }
  if (document.getElementById('lb').classList.contains('show')) {
    if (e.key === 'ArrowLeft') navLb(-1);
    if (e.key === 'ArrowRight') navLb(1);
  }
});

// ═══════════════════════════════════════════════════════════════
// LANGUAGE SWITCH
// ═══════════════════════════════════════════════════════════════
function toggleLang() {
  L = L === 'cn' ? 'en' : 'cn';
  localStorage.setItem('lang', L);
  document.documentElement.lang = L === 'cn' ? 'zh-CN' : 'en';
  document.getElementById('lang-cn').className = L === 'cn' ? 'active-lang' : '';
  document.getElementById('lang-en').className = L === 'en' ? 'active-lang' : '';
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    var val = I18N[L] && I18N[L][k] || k;
    if (val.indexOf('<br>') >= 0) el.innerHTML = val;
    else el.textContent = val;
  });
  refreshAll();
  var wasOpen = document.getElementById('modal-overlay').classList.contains('show');
  if (wasOpen) {
    var titleEl = document.querySelector('.modal-hero h1');
    if (titleEl) {
      // re-open with same id if known
      var id = null;
      Object.keys(DETAIL).forEach(function(k) { if (DETAIL[k].cn && DETAIL[k].cn.title === titleEl.textContent) id = k; });
      // simpler: just close
      closeModal();
    }
  }
}

function refreshAll() {
  renderFeatured();
  renderWorks();
  renderEdu();
  renderAward();
  renderExp();
  renderSkills();
  renderContact();
  document.getElementById('footer-year').textContent = new Date().getFullYear();
}

// ═══════════════════════════════════════════════════════════════
// NAV scroll spy & init
// ═══════════════════════════════════════════════════════════════
var sections = ['about', 'works', 'contact'];
window.addEventListener('scroll', function() {
  var nav = document.getElementById('nav');
  nav.classList.toggle('scrolled', window.scrollY > 50);
  var current = 'about';
  sections.forEach(function(s) {
    var el = document.getElementById(s);
    if (el && window.scrollY >= el.offsetTop - 200) current = s;
  });
  document.querySelectorAll('#nav-links a').forEach(function(a) {
    a.classList.toggle('active', a.getAttribute('data-nav') === current);
  });
});

// Initial render
refreshAll();
