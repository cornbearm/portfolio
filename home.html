<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品集目录 · Mao Yuhang Portfolio</title>
<meta name="description" content="毛雨杭 Mao Yuhang - 视觉设计 · IP衍生品 · AIGC创作。作品集展示品牌设计、衍生品设计、AIGC内容创作、游戏与插画等领域创意作品。">
<meta name="keywords" content="毛雨杭, Mao Yuhang, 视觉设计, 品牌设计, IP衍生品, AIGC, 作品集, Portfolio, Designer">
<meta property="og:title" content="毛雨杭 Mao Yuhang · Portfolio">
<meta property="og:description" content="视觉设计 · IP衍生品 · AIGC创作">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="image" href="images/elaiyunzhuan/cover.jpg">
<link rel="preload" as="image" href="images/cat-game/poster.jpg">
<link rel="preload" as="image" href="images/jiyouqu/poster.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--c-bg:#fff;--c-text:#1a1a1a;--c-sub:#6e6e6e;--c-light:#999;--c-border:#e8e8e8;--c-card:rgba(255,255,255,.75);--c-accent:#000;--c-tag-bg:rgba(0,0,0,.04);--c-tag-text:#555;--radius:12px;--shadow-card:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans SC',-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--c-text);background:var(--c-bg) url('images/bg-paper.jpg') fixed;background-size:cover;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:rgba(255,255,255,.30)}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;transition:background .3s,box-shadow .3s}
.nav.scrolled{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 1px 0 var(--c-border)}
.nav-logo{font-size:15px;font-weight:600;letter-spacing:-.01em;flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:13px;font-weight:500;color:var(--c-sub);transition:color .2s;position:relative}
.nav-links a:hover,.nav-links a.active{color:var(--c-text)}
.nav-links a.active::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1.5px;background:var(--c-text);border-radius:1px}
.lang-switch{margin-left:12px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--c-sub);cursor:pointer;user-select:none;background:none;border:1px solid var(--c-border);border-radius:20px;padding:5px 14px;transition:all .2s}
.lang-switch:hover{border-color:var(--c-text);color:var(--c-text)}
.lang-switch .sep{color:var(--c-border)}.lang-switch .active-lang{color:var(--c-text);font-weight:600}

/* Section */
.section{padding:120px 40px;max-width:1100px;margin:0 auto}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--c-light);margin-bottom:16px}
.section-title{font-size:clamp(28px,5vw,44px);font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:24px}

/* Hero Banner */
.hero-banner{min-height:45vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:120px 40px 80px;max-width:1100px;margin:0 auto;text-align:center}
.hero-banner h1{font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:14px}
.hero-banner .tagline{font-size:16px;color:var(--c-sub);margin-bottom:10px;font-weight:400}

/* Featured */
.featured-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px}
.feat-card{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;background:var(--c-card);transition:transform .3s,box-shadow .3s}
.feat-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.feat-img{width:100%;height:200px;background:linear-gradient(135deg,#e8e8e8,#f5f5f5);overflow:hidden}
.feat-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.feat-card:hover .feat-img img{transform:scale(1.03)}
.feat-info{padding:16px 18px 14px;background:#fff;min-height:160px;display:flex;flex-direction:column;justify-content:flex-start}
.feat-title{font-size:18px;font-weight:700;line-height:1.25;margin-bottom:6px;letter-spacing:-.01em}
.feat-meta{font-size:12px;color:var(--c-light);display:flex;gap:12px}
.feat-award{display:inline-block;font-size:11px;color:var(--c-sub);background:#f5f5f5;border:1px solid #ececec;padding:3px 9px;border-radius:6px;margin-bottom:10px;font-weight:400;letter-spacing:.01em;align-self:flex-start}
.feat-subtitle{font-size:12px;color:var(--c-sub);line-height:1.5;margin:0 0 4px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.feat-tagline{font-size:11px;color:var(--c-light);line-height:1.5;margin-bottom:8px}
.feat-links{display:flex;flex-wrap:wrap;gap:18px;padding-top:12px}
.feat-links a{font-size:14px;color:#888;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color .2s,border-color .2s;font-weight:500;border-bottom:1px solid transparent;padding-bottom:1px}
.feat-links a:hover{color:#222;border-bottom-color:#222}
.feat-link-arrow{font-size:11px;line-height:1;opacity:.5;transition:transform .2s,opacity .2s}
.feat-links a:hover .feat-link-arrow{opacity:1;transform:translate(1px,-1px)}

/* Works */
.works-category{margin-bottom:80px}
.works-category:last-child{margin-bottom:0}
.cat-header{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--c-border);display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cat-name{font-size:20px;font-weight:700;letter-spacing:-.01em}
.cat-sub{font-size:13px;color:var(--c-light);font-weight:400}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.work-card{background:var(--c-card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s}
.work-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-card)}
.work-thumb{aspect-ratio:4/3;background:linear-gradient(135deg,#eee,#f8f8f8);overflow:hidden}
.work-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.work-card:hover .work-thumb img{transform:scale(1.04)}
.work-info{padding:14px 16px 16px}
.work-name{font-size:14px;font-weight:600;margin-bottom:4px}
.work-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.work-tag{font-size:11px;color:var(--c-tag-text);background:var(--c-tag-bg);padding:3px 10px;border-radius:100px}

/* About */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px 60px;margin-top:40px}
.about-block h3{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:16px}
.edu-item,.exp-item{margin-bottom:20px}
.edu-item:last-child,.exp-item:last-child{margin-bottom:0}
.edu-school{font-weight:600;font-size:15px;margin-bottom:2px}
.edu-degree{font-size:14px;color:var(--c-sub);margin-bottom:2px}
.edu-date{font-size:12px;color:var(--c-light)}
.exp-company{font-weight:600;font-size:15px}
.exp-role{font-size:14px;color:var(--c-sub);margin-bottom:2px}
.exp-date{font-size:12px;color:var(--c-light)}
/* Skills */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px 40px}
.skill-group{margin-bottom:20px}
.skill-group h4{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--c-light);margin-bottom:10px}
.skill-tags{display:flex;gap:8px;flex-wrap:wrap}
.skill-tag{font-size:13px;background:var(--c-tag-bg);color:var(--c-tag-text);padding:6px 14px;border-radius:100px;font-weight:400}

/* Contact */
.contact-wrap{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:32px}
.contact-item{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--c-border);font-size:15px}
.contact-item:first-child{border-top:1px solid var(--c-border)}
.contact-icon{width:40px;height:40px;border-radius:50%;background:var(--c-tag-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.contact-label{font-size:11px;color:var(--c-light);text-transform:uppercase;letter-spacing:.04em}
.contact-value{font-weight:500}
.contact-value a:hover{text-decoration:underline}

/* Detail Modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);overflow-y:auto;display:none;opacity:0;transition:opacity .35s}
.modal-overlay.show{display:block;opacity:1}
.modal-close{position:fixed;top:24px;right:28px;z-index:201;width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.05);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.modal-close:hover{background:rgba(0,0,0,.1);transform:rotate(90deg)}
.modal-content{max-width:920px;margin:0 auto;padding:100px 40px 80px}
.modal-hero{margin-bottom:56px}
.modal-link-btn{display:inline-block;padding:12px 28px;background:#1a1a1a;color:#fff;border-radius:50px;font-size:14px;font-weight:500;letter-spacing:.04em;text-decoration:none;transition:background .2s,transform .2s}.modal-link-btn:hover{background:#333;transform:translateY(-2px)}
.modal-hero .section-label{margin-bottom:24px}
.modal-hero h1{font-size:clamp(30px,5vw,46px);font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:32px}
.modal-meta{display:grid;grid-template-columns:repeat(3,1fr);padding:20px 0;border-top:1px solid var(--c-border);border-bottom:1px solid var(--c-border)}
.modal-meta span{display:flex;flex-direction:column;gap:4px;padding:0 24px}
.modal-meta span:first-child{padding-left:0}
.modal-meta span:not(:last-child){border-right:1px solid var(--c-border)}
.modal-meta span:last-child{padding-right:0}
.modal-meta strong{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--c-light)}
.modal-meta span{font-size:14px;color:var(--c-text)}
.modal-body{font-size:15px;line-height:1.8;color:var(--c-text)}
.modal-section{margin-top:48px}
.modal-section:first-child{margin-top:0}
.modal-section h3{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--c-light);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--c-border)}
.modal-section p{font-size:15px;line-height:1.85;color:var(--c-text)}

/* WeChat Shop QR Modal */
.qr-overlay{position:fixed;inset:0;z-index:300;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .25s}
.qr-overlay.show{display:flex;opacity:1}
.qr-box{position:relative;width:min(360px,90vw);background:#fff;border-radius:18px;padding:36px 28px 28px;box-shadow:0 20px 60px rgba(0,0,0,.08);text-align:center;animation:qrPop .35s cubic-bezier(.2,.9,.3,1.2)}
@keyframes qrPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.qr-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.05);border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;color:#999}
.qr-close:hover{background:rgba(0,0,0,.1);transform:rotate(90deg);color:#333}
.qr-title{font-size:18px;font-weight:600;letter-spacing:-.01em;margin-bottom:6px;color:var(--c-text)}
.qr-sub{font-size:13px;color:var(--c-sub);margin-bottom:20px}
.qr-canvas-wrap{display:flex;justify-content:center;padding:14px;background:#fafafa;border-radius:12px;margin-bottom:16px}
#qr-canvas{display:flex;justify-content:center}
#qr-canvas canvas,#qr-canvas img{border-radius:6px}
.qr-tip{font-size:12px;color:var(--c-light);margin-bottom:10px;line-height:1.5}
.qr-scheme-link{display:block;padding:10px 16px;background:#1a1a1a;color:#fff;border-radius:99px;font-size:13px;font-weight:500;text-decoration:none;margin-bottom:10px;transition:background .2s}
.qr-scheme-link:hover{background:#333}
.qr-copy{width:100%;padding:10px 16px;background:#fff;color:var(--c-text);border:1px solid var(--c-border);border-radius:99px;font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit}
.qr-copy:hover{background:var(--c-text);color:#fff;border-color:var(--c-text)}
.qr-copy.copied{background:#07c160;border-color:#07c160;color:#fff}

/* Editorial Gallery */
.editorial-gallery{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin:48px 0;align-items:start}
.eg-section{grid-column:1/-1;display:flex;align-items:center;gap:14px;margin:20px 0 0}
.eg-section:first-child{margin-top:0}
.eg-section-line-l{width:28px;height:1px;background:var(--c-text);flex-shrink:0}
.eg-section-title{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--c-text);white-space:nowrap}
.eg-section-line-r{flex:1;height:1px;background:var(--c-border)}
.eg-item{position:relative;overflow:hidden;border-radius:var(--radius);cursor:pointer;transition:transform .35s cubic-bezier(.25,.1,.25,1),box-shadow .35s}
.eg-item:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.06)}
.eg-item img{width:100%;display:block;transition:transform .5s cubic-bezier(.25,.1,.25,1)}
.eg-item:hover img{transform:scale(1.03)}
.eg-item figcaption{font-size:12px;color:var(--c-light);margin-top:8px;font-weight:400;line-height:1.4}
.eg-hero{grid-column:1/-1}
.eg-wide{grid-column:span 4}
.eg-half{grid-column:span 3}
.eg-third{grid-column:span 2}
.eg-full{grid-column:1/-1}
.eg-full img{width:100%;height:auto;display:block;border-radius:var(--radius)}
.eg-video-wrap{cursor:default;margin:0}
.eg-video-wrap video{width:100%;max-height:none;border-radius:var(--radius)}
.eg-vimeo-link{display:inline-block;margin-top:10px;font-size:13px;color:var(--c-light);text-decoration:none;letter-spacing:.02em;transition:color .2s}
.eg-vimeo-link:hover{color:var(--c-text)}

/* Lightbox */
.lb{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center}
.lb.show{display:flex}
.lb img{max-width:80vw;max-height:88vh;object-fit:contain;border-radius:4px;cursor:pointer;transition:opacity .2s}
.lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;background:none;border:none;cursor:pointer;z-index:2}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:2}
.lb-nav:hover{background:rgba(255,255,255,.25)}
.lb-prev{left:24px}
.lb-next{right:24px}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:14px;font-family:var(--f-sans)}

/* Footer */
.footer{text-align:center;padding:40px;font-size:12px;color:var(--c-light);border-top:1px solid var(--c-border)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s ease-out both}
.fade-up:nth-child(1){animation-delay:0s}
.fade-up:nth-child(2){animation-delay:.1s}
.fade-up:nth-child(3){animation-delay:.2s}
.fade-up:nth-child(4){animation-delay:.3s}

/* Responsive */
@media(max-width:768px){
  .nav{padding:0 20px;height:56px}
  .nav-links{display:none}
  .section{padding:80px 20px}
  .hero-banner{padding:100px 20px 60px}
  .featured-grid{grid-template-columns:1fr;gap:12px}
  .works-grid{grid-template-columns:repeat(2,1fr)}
  .about-grid{grid-template-columns:1fr;gap:40px}
  .skills-grid{grid-template-columns:1fr}
  .contact-wrap{grid-template-columns:1fr}
  .modal-content{padding:80px 20px 60px}
  .modal-meta{grid-template-columns:1fr;padding:0}
  .modal-meta span{padding:14px 0!important;border-right:none!important;border-bottom:1px solid var(--c-border)}
  .modal-meta span:last-child{border-bottom:none}
  .editorial-gallery{grid-template-columns:1fr;gap:12px}
  .eg-hero,.eg-wide,.eg-half,.eg-third{grid-column:1/-1}
  .lb-nav{width:44px;height:44px;font-size:28px}
  .lb-prev{left:12px}
  .lb-next{right:12px}
  .lb img{max-width:88vw;max-height:80vh}
}
@media(max-width:480px){
  .works-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav" id="nav">
  <div class="nav-logo">Mao Yuhang</div>
  <div class="nav-links" id="nav-links">
    <a href="cover.html">Home</a>
    <a href="#works" data-nav="works">Works</a>
    <a href="#about" data-nav="about">About</a>
    <a href="#contact" data-nav="contact">Contact</a>
  </div>
  <button class="lang-switch" id="lang-switch" onclick="toggleLang()" title="Switch Language">
    <span class="active-lang" id="lang-cn">中</span>
    <span class="sep">/</span>
    <span id="lang-en">EN</span>
  </button>
</nav>

<!-- Hero Banner -->
<section class="hero-banner fade-up">
  <h1 data-i18n="hero.name">毛雨杭</h1>
  <p class="tagline" data-i18n="hero.tagline">视觉设计 · IP衍生品 · AIGC创作</p>
  <p style="font-size:15px;color:var(--c-light);line-height:1.7;max-width:480px" data-i18n="hero.intro">探索品牌、内容与技术交汇处的创意表达。</p>
</section>

<!-- Featured Projects -->
<section class="section fade-up" style="padding-top:0">
  <div class="section-label" data-i18n="featured.label">Featured Projects</div>
  <div class="section-title" data-i18n="featured.title">精选项目</div>
  <div class="featured-grid" id="featured-grid"></div>
</section>

<!-- WORKS -->
<section id="works" class="section" style="padding-top:100px">
  <div class="section-label" data-i18n="works.label">All Works</div>
  <div class="section-title" data-i18n="works.title">作品</div>
  <div id="works-container"></div>
</section>

<!-- ABOUT -->
<section id="about" class="section fade-up" style="padding-top:100px">
  <div class="section-label" data-i18n="about.label">About</div>
  <div class="section-title" data-i18n="about.title">关于我</div>
  <p style="font-size:16px;color:var(--c-sub);line-height:1.7;max-width:680px;margin-bottom:0" data-i18n="about.intro">
    拥有动画、视觉设计、品牌传播、IP衍生品设计与AIGC内容创作背景，关注品牌表达、用户体验与创意技术的融合。
  </p>
  <div class="about-grid">
    <div class="about-block" id="about-edu-block"></div>
    <div class="about-block" id="about-exp-block"></div>
  </div>
  <div style="margin-top:48px">
    <h3 data-i18n="skills.title" style="font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:24px">Skills</h3>
    <div class="skills-grid" id="skills-grid"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section fade-up" style="padding-top:100px">
  <div class="section-label" data-i18n="contact.label">Contact</div>
  <div class="section-title" data-i18n="contact.title">联系方式</div>
  <div class="contact-wrap" id="contact-wrap"></div>
  <div style="margin-top:40px">
    <button class="btn btn-outline" onclick="downloadResume()" style="font-size:15px;display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:100px;background:transparent;color:var(--c-text);border:1.5px solid var(--c-border);cursor:pointer;transition:all .25s" onmouseover="this.style.borderColor='var(--c-text)'" onmouseout="this.style.borderColor='var(--c-border)'">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="contact.btnResume">下载简历 PDF</span>

function openDetail(id) {
  var d = DETAIL[id];
  if (!d) {
    // Find the work item from WORKS to show as placeholder
    var found = null;
    WORKS.forEach(function(cat) {
      cat.items.forEach(function(it) { if (it.id === id) found = it; });
    });
    var ov = document.getElementById('modal-overlay');
    var ct = document.getElementById('modal-content');
    var placeholderTitle = found ? (L === 'cn' ? found.cn.title : found.en.title) : id;
    var comingSoon = L === 'cn' ? '作品即将上线 · Coming Soon' : 'Project coming soon';
    var placeholderDesc = L === 'cn'
      ? '这个分类的作品正在整理中，敬请期待。'
      : 'Works in this category are being curated. Stay tuned.';
    window.currentGalImgs = [];
    ct.innerHTML =
      '<div class="modal-hero">' +
        '<h1>' + placeholderTitle + '</h1>' +
        '<div class="modal-meta">' +
          '<span><strong>' + t('detail.role') + '</strong>' + (L === 'cn' ? '整理中' : 'Curating') + '</span>' +
          '<span><strong>' + t('detail.timeline') + '</strong>' + (L === 'cn' ? '即将公布' : 'TBA') + '</span>' +
          '<span><strong>' + t('detail.tools') + '</strong>' + (L === 'cn' ? '待定' : 'TBA') + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="modal-body">' +
        '<div class="modal-section"><p style="color:var(--c-sub);font-size:15px;line-height:1.8">' + placeholderDesc + '</p></div>' +
        '<div class="modal-section" style="text-align:center;padding:60px 0;color:var(--c-light)"><div style="font-size:64px;margin-bottom:20px;opacity:.4">🚧</div><div style="font-size:13px;letter-spacing:.08em">' + comingSoon + '</div></div>' +
      '</div>';
    ov.classList.add('show');
    document.body.style.overflow = 'hidden';
    ov.scrollTop = 0;
    return;
  }
  var dd = p(d);
  var ov = document.getElementById('modal-overlay');
  var ct = document.getElementById('modal-content');

  // Build editorial gallery
  var galHtml = '';
  var galImgs = [];
  if (d.gallery && d.gallery.length > 0) {
    if (typeof d.gallery[0] === 'object') {
      // Structured editorial gallery
      galImgs = d.gallery.filter(function(it){return it.type==='image'}).map(function(it){return it.src});
      galHtml = '<div class="editorial-gallery">';
      d.gallery.forEach(function(item) {
        if (item.type === 'section') {
          galHtml += '<div class="eg-section"><span class="eg-section-line-l"></span><span class="eg-section-title">' + p(item) + '</span><span class="eg-section-line-r"></span></div>';
        } else if (item.type === 'image') {
          var idx = galImgs.indexOf(item.src);
          galHtml += '<figure class="eg-item eg-' + item.layout + '" onclick="openLb(' + idx + ')"><img src="' + item.src + '" alt="' + p(item) + '" loading="lazy">' + (p(item) ? '<figcaption>' + p(item) + '</figcaption>' : '') + '</figure>';
        } else if (item.type === 'video') {
          galHtml += '<figure class="eg-item eg-' + item.layout + ' eg-video-wrap"><video src="' + item.src + '" controls playsinline preload="metadata" style="width:100%;display:block;border-radius:var(--radius)"></video>' + (item.vimeoUrl ? '<a class="eg-vimeo-link" href="' + item.vimeoUrl + '" target="_blank" rel="noopener noreferrer">在 Vimeo 上观看完整版 →</a>' : '') + '</figure>';
        } else if (item.type === 'vimeo') {
          galHtml += '<figure class="eg-item eg-' + item.layout + ' eg-video-wrap"><div class="eg-vimeo-wrap" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--radius)"><iframe src="https://player.vimeo.com/video/' + item.id + '" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%"></iframe></div>' + (p(item) ? '<figcaption>' + p(item) + '</figcaption>' : '') + '</figure>';
        }
      });
      galHtml += '</div>';
    } else {
      // Simple array gallery (legacy)
      galImgs = d.gallery.slice();
      galHtml = '<div class="editorial-gallery">' +
        d.gallery.map(function(src, i) {
          return '<figure class="eg-item eg-half" onclick="openLb(' + i + ')"><img src="' + src + '" loading="lazy"></figure>';
        }).join('') + '</div>';
    }
  } else {
    var phTxt = L === 'cn' ? '项目图片即将上线' : 'Project images coming soon';
    galHtml = '<div class="editorial-gallery"><figure class="eg-item eg-hero" style="aspect-ratio:16/9;background:linear-gradient(135deg,#f5f5f5,#eee);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:#ccc;font-size:14px">' + phTxt + '</figure></div>';
  }
  window.currentGalImgs = galImgs;

  ct.innerHTML =
    '<div class="modal-hero">' +
      (d.award ? '<div class="feat-award" style="margin-bottom:20px">' + (L === 'cn' ? d.award.cn : d.award.en) + '</div>' : '') +
      '<h1>' + dd.title + '</h1>' +
      (d.subtitle ? '<div class="modal-subtitle" style="font-size:18px;color:var(--c-sub);margin-top:-20px;margin-bottom:32px;font-weight:400">' + (L === 'cn' ? d.subtitle.cn : d.subtitle.en) + '</div>' : '') +
      '<div class="modal-meta">' +
        '<span><strong>' + t('detail.role') + '</strong>' + dd.role + '</span>' +
        '<span><strong>' + t('detail.timeline') + '</strong>' + dd.timeline + '</span>' +
        '<span><strong>' + t('detail.tools') + '</strong>' + dd.tools + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="modal-body">' +
      (d.tagline ? '<div class="modal-tagline" style="font-size:16px;color:var(--c-text);line-height:1.7;margin-bottom:32px;padding:20px 24px;background:var(--c-card);border-radius:var(--radius);border-left:3px solid var(--c-text)">' + (L === 'cn' ? d.tagline.cn : d.tagline.en) + '</div>' : '') +
      '<div class="modal-section"><h3>' + t('detail.overview') + '</h3><p>' + dd.overview + '</p></div>' +
      (dd.responsibility ? '<div class="modal-section"><h3>' + t('detail.responsibility') + '</h3><p>' + dd.responsibility.replace(/\n/g, '<br>') + '</p></div>' : '') +
      (dd.process ? '<div class="modal-section"><h3>' + t('detail.process') + '</h3><p>' + dd.process + '</p></div>' : '') +
      (dd.outcome ? '<div class="modal-section"><h3>' + t('detail.outcome') + '</h3><p>' + dd.outcome + '</p></div>' : '') +
      (d.link ? '<div class="modal-section"><a href="' + d.link.url + '" target="_blank" rel="noopener" class="modal-link-btn">' + (d.link[L] || d.link.cn) + '</a></div>' : '') +
      (d.links && d.links.length ? '<div class="modal-links" style="display:flex;flex-wrap:wrap;gap:10px;margin:24px 0 48px"><strong style="font-size:13px;color:var(--c-light);font-weight:500;width:100%;margin-bottom:4px">🔗 External Links</strong>' + d.links.map(function(lk) { return '<a href="' + lk.url + '" target="_blank" rel="noopener" class="modal-link-btn" style="margin:0">' + (L === 'cn' ? lk.cn : lk.en) + ' ↗</a>'; }).join('') + '</div>' : '') +
      galHtml +
    '</div>';
  ov.classList.add('show');
  document.body.style.overflow = 'hidden';
  ov.scrollTop = 0;
}

  document.getElementById('modal-overlay').classList.remove('show');

// WECHAT SHOP QR MODAL
// ═══════════════════════════════════════════════════════════════
var _qrSchemeUrl = '';
var _qrImgPath = '';
function openShopQR(encodedUrl, label, encodedImg) {
  event && event.stopPropagation && event.stopPropagation();
  _qrSchemeUrl = decodeURIComponent(encodedUrl);
  _qrImgPath = encodedImg ? decodeURIComponent(encodedImg) : '';
  var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  var isWeixin = /MicroMessenger/i.test(navigator.userAgent);
  var L = localStorage.getItem('lang') || 'cn';
  document.getElementById('qr-title').textContent = label;
  document.getElementById('qr-sub').textContent = L === 'cn' ? '微信扫一扫查看商品' : 'Scan with WeChat to view product';
  document.getElementById('qr-tip').textContent = L === 'cn'
    ? '若已在微信中浏览，可点击下方链接唤起'
    : 'If viewing in WeChat, tap the link below to open';
  // scheme link
  var schemeA = document.getElementById('qr-scheme-link');
  schemeA.href = _qrSchemeUrl;
  schemeA.textContent = L === 'cn' ? '打开微信小店 ↗' : 'Open WeChat Shop ↗';
  // 移动端且在微信内：直接尝试 scheme，关闭弹窗
  if (isMobile && isWeixin) {
    window.location.href = _qrSchemeUrl;
    return;
  }
  // 移动端非微信：尝试 scheme，1.5s 后仍停留则弹二维码
  if (isMobile) {
    var t0 = Date.now();
    window.location.href = _qrSchemeUrl;
    setTimeout(function() {
      if (Date.now() - t0 < 2000) {
        showQrModal();
      }
    }, 1500);
    return;
  }
  // PC端：直接弹二维码
  showQrModal();
}
function showQrModal() {
  var box = document.getElementById('qr-overlay');
  box.classList.add('show');
  document.body.style.overflow = 'hidden';
  var target = document.getElementById('qr-canvas');
  target.innerHTML = '';
  // 优先使用数据里指定的二维码图片（来自微信小程序等）
  if (_qrImgPath) {
    target.innerHTML = '<img src="' + _qrImgPath + '" alt="QR Code" style="width:240px;height:240px;display:block;object-fit:contain">';
    return;
  }
  // 兜底：用 qrcode 库生成（不再作为主路径，但保留兼容性）
  try {
    var qr = qrcode(0, 'M');
    qr.addData(_qrSchemeUrl);
    qr.make();
    var imgTag = qr.createImgTag(5, 0);
    target.innerHTML = imgTag;
    var im = target.querySelector('img');
    if (im) { im.style.width = '200px'; im.style.height = '200px'; im.style.display = 'block'; }
  } catch (e) {
    target.innerHTML = '<div style="padding:20px;font-size:12px;color:#999">二维码加载失败</div>';
  }
}
function closeShopQR(ev) {
  if (ev && ev.target && ev.target.closest('.qr-box') && !ev.target.classList.contains('qr-close')) return;
  document.getElementById('qr-overlay').classList.remove('show');
  document.body.style.overflow = '';
  var btn = document.getElementById('qr-copy');
  if (btn) { btn.classList.remove('copied'); btn.textContent = '复制链接'; }
}
function copyShopURL() {
  var btn = document.getElementById('qr-copy');
  var L = localStorage.getItem('lang') || 'cn';
  var doneTxt = L === 'cn' ? '✓ 已复制' : '✓ Copied';
  var copyTxt = L === 'cn' ? '复制链接' : 'Copy Link';
  var fallback = function() {
    var ta = document.createElement('textarea');
    ta.value = _qrSchemeUrl;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(_qrSchemeUrl).catch(fallback);
  } else {
    fallback();
  }
  btn.classList.add('copied');
  btn.textContent = doneTxt;
  setTimeout(function() {
    btn.classList.remove('copied');
    btn.textContent = copyTxt;
  }, 1800);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var q = document.getElementById('qr-overlay');
    if (q && q.classList.contains('show')) closeShopQR();
  }
});

// LIGHTBOX
// ═══════════════════════════════════════════════════════════════
function openLb(idx) {
  var imgs = window.currentGalImgs || [];
  if (imgs.length === 0) return;
  window.lbIndex = Math.max(0, Math.min(idx, imgs.length - 1));
  var img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.src = imgs[window.lbIndex];
  img.onload = function() { img.style.opacity = '1'; };
  var counter = document.getElementById('lb-counter');
  counter.textContent = (window.lbIndex + 1) + ' / ' + imgs.length;
  document.getElementById('lb').classList.add('show');
}
function navLb(dir, e) {
  if (e) e.stopPropagation();
  var imgs = window.currentGalImgs || [];
  if (imgs.length === 0) return;
  window.lbIndex = (window.lbIndex + dir + imgs.length) % imgs.length;
  var img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.src = imgs[window.lbIndex];
  img.onload = function() { img.style.opacity = '1'; };
  var counter = document.getElementById('lb-counter');
  counter.textContent = (window.lbIndex + 1) + ' / ' + imgs.length;
}
function closeLb(e) {
  if (e) e.stopPropagation();
  document.getElementById('lb').classList.remove('show');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeModal(); closeLb(); }
  if (document.getElementById('lb').classList.contains('show')) {
    if (e.key === 'ArrowLeft') navLb(-1);
    if (e.key === 'ArrowRight') navLb(1);
  }
});

  });
  refreshAll();
  var wasOpen = document.getElementById('modal-overlay').classList.contains('show');
  if (wasOpen) closeModal();
}

function refreshAll() {
  renderFeatured();
  renderWorks();
  renderEdu();
  renderExp();
  renderSkills();
  renderContact();
  document.getElementById('footer-year').textContent = new Date().getFullYear();
}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function scrollToSection(id) {
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth' });
}

function downloadResume() {
  alert(L === 'cn' ? '简历下载功能即将上线' : 'Resume download coming soon');
}

// ═══════════════════════════════════════════════════════════════
// NAV scroll spy & init
// ═══════════════════════════════════════════════════════════════
var sections = ['works', 'about', 'contact'];
window.addEventListener('scroll', function() {
  var nav = document.getElementById('nav');
  nav.classList.toggle('scrolled', window.scrollY > 50);

  var current = 'home';
  sections.forEach(function(s) {
    var el = document.getElementById(s);
    if (el && window.scrollY >= el.offsetTop - 100) current = s;
  });
  document.querySelectorAll('#nav-links a').forEach(function(a) {
    a.classList.toggle('active', a.getAttribute('data-nav') === current);
  });
});

// Init
refreshAll();
document.getElementById('footer-year').textContent = new Date().getFullYear();
document.getElementById('lang-cn').className = 'active-lang';
</script>
